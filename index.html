<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audio2Tube</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Cross-origin isolation (required for ffmpeg.wasm threads) -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">

  <!-- FFmpeg WASM -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<div id="drop-overlay">📂 Drop files anywhere</div>
<body>
  <div class="container">

    <h1>🎧 Audio2Tube 🎥 </h1>
    <p class="subtitle">
      Turn your image + audio into a ready-to-upload YouTube video!
    </p>

    <div class="upload-card">
      <p class="drag-hint">
        📂 Drag & drop your audio or image anywhere on the page
        <span class="drag-sub">(or use the upload buttons below)</span>
      </p>
      <div class="file-inputs">

        <label class="file-label">
          <span id="image-label-text">🖼 Upload Image</span>
          <input type="file" id="image" accept="image/*" />
        </label>
        <p class="format-note">
        Supported image formats: JPG, PNG, WebP
        </p>
        <label class="file-label">
          <span id="audio-label-text">🎵 Upload Audio</span>
          <input type="file" id="audio" accept="audio/*" />
        </label>

      </div>
      <div class="quality-row">
        <label for="resolution">Output Resolution:</label>
        <select id="resolution">
          <option value="1280">720p (Fastest)</option>
          <option value="1920">1080p (Balanced)</option>
        </select>
      </div>
      <button id="convert">🚀 Convert</button>
      <button id="cancelBtn" class="cancel-btn">
        ⛔ Cancel
      </button>

      <div id="progress-box" style="display:none;">
        <div id="progress-bar"></div>
      </div>

      <div id="status"></div>

    </div>

    <!-- OUTPUT SECTION -->
    <div id="output">

      <video id="preview" controls style="display:none;"></video>

      <!-- New Save Button -->
      <button id="saveBtn" class="download-btn" style="display:none;">
        💾 Save Video
      </button>

    </div>

    <footer>
      <!-- <button id="contribute">💖 Contribute</button> -->
      <p>👥 <span id="visit-count">...</span> people visited</p>
      <p>Made with ❤️</p>
    </footer>

  </div>

  <!-- Load your script LAST -->
  <script src="script.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>

  <div id="drop-overlay">📂 Drop files anywhere</div>
</body>
</html>
